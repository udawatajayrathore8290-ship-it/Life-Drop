<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blood Donation Registration System</title>
<link rel="stylesheet" href="donor.css">
</head>
<body>

<header>
    <h1>🩸 Blood Donation Registration System</h1>
    <p>Donate Blood, Save Lives</p>
</header>

<div class="container">

    <div class="card">
        <h2>Register as Donor</h2>

        <form id="donorForm">
            <div class="form-grid">

                <input type="text" id="name" placeholder="Full Name" required>

                <input type="number" id="age" placeholder="Age" min="18" max="65" required>

                <select id="bloodGroup" required>
                    <option value="">Blood Group</option>
                    <option>A+</option>
                    <option>A-</option>
                    <option>B+</option>
                    <option>B-</option>
                    <option>AB+</option>
                    <option>AB-</option>
                    <option>O+</option>
                    <option>O-</option>
                </select>

                <input type="text" id="city" placeholder="City" required>

                <input type="tel" id="mobile" placeholder="Mobile Number" required>

                <input type="date" id="lastDonation">

            </div>

            <br>

            <button class="btn" type="submit">
                Register Donor
            </button>

        </form>
    </div>

    <div class="card">

        <h2>Donor List</h2>

        <div class="search-box">
            <input type="text" id="searchInput"
                placeholder="Search by Name, Blood Group or City">
        </div>

        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Blood Group</th>
                    <th>City</th>
                    <th>Mobile</th>
                    <th>Last Donation</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="donorTable">
            </tbody>
        </table>

    </div>

</div>

<script src="doner.js"></script>
</body>
</html>
